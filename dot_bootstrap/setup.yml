- name: Install system
  hosts: localhost
  connection: local
  become: false

  vars:
    os_type: "{{ ansible_os_family }}"

    homebrew_packages:
      - neovim
      - fish
      - fzf
      - yazi
      - bat
      - eza
      - ripgrep
      - pyenv
      - virtualenv
      - gh
      - tldr
      - gcc
      - zoxide
      - wget
      - tmux
      - yt-dlp
      - repomix
      - oven-sh/bun/bun
      - pnpm
      - docker
      - docker-buildx
      - vivid
      - node
      - sketchybar
      - borders
      - jq
      - fd
      - lazygit
      - rust
      - uv
      - opencode
      - defaultbrowser
      - bottom
      - ffmpeg
      - openai-whisper
      - 1password-cli
      - unar
      - nvm
      - starship
      - btop
      - cloc
      - tw93/tap/mole
      - codex
      - rtk
      - typst

    homebrew_cask_packages:
      - arc
      - zen
      - raycast
      - cleanshot
      - 1password
      - claude
      - ghostty
      - chatgpt
      - aldente
      - visual-studio-code
      - cursor
      - discord
      - obsidian
      - font-hack-nerd-font
      - font-sketchybar-app-font
      - font-jetbrains-mono-nerd-font
      - font-sf-mono-nerd-font-ligaturized
      - webcatalog
      - vivid-app
      - superwhisper
      - pdf-expert
      - macwhisper
      - the-unarchiver

  tasks:
    - name: Update Homebrew
      community.general.homebrew:
        update_homebrew: yes

    - name: Tap Homebrew mac formulaes
      community.general.homebrew_tap:
        name:
          - FelixKratz/formulae
          - nikitabobko/tap
          - oven-sh/bun
          - tw93/tap
      when: os_type == 'Darwin'
      ignore_errors: true

    - name: Install Homebrew packages
      community.general.homebrew:
        name: "{{ item }}"
        state: present
      loop: "{{ homebrew_packages }}"
      register: homebrew_package_results
      ignore_errors: true

    - name: Report failed Homebrew packages
      debug:
        msg: "Failed to install Homebrew package: {{ item.item }}"
      loop: "{{ homebrew_package_results.results | selectattr('failed', 'defined') | selectattr('failed') | list }}"
      when: homebrew_package_results is defined

    - name: Ensure fish is in /etc/shells
      lineinfile:
        path: /etc/shells
        line: /opt/homebrew/bin/fish
        state: present
      become: true
      when: os_type == 'Darwin'

    - name: Set fish as default shell
      user:
        name: "{{ ansible_user_id }}"
        shell: /opt/homebrew/bin/fish
      become: true
      when: os_type == 'Darwin'

    - name: Install fisher
      shell: |
        fish -c 'curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source && fisher install jorgebucaran/fisher'
      when: os_type == 'Darwin'
      ignore_errors: true

    - name: Install/update fish plugins with fisher
      shell: fish -c 'fisher update'
      when: os_type == 'Darwin'
      ignore_errors: true

    - name: Clone TMP
      shell: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
      ignore_errors: true
      args:
        creates: ~/.tmux/plugins/tpm

    - name: Install aerospace (cask)
      community.general.homebrew:
        name: nikitabobko/tap/aerospace
        state: present
        install_options: ["cask"]
      when: os_type == 'Darwin'

    - name: Install Homebrew cask packages
      community.general.homebrew:
        name: "{{ item }}"
        state: present
        install_options: ["cask"]
      when: os_type == 'Darwin'
      loop: "{{ homebrew_cask_packages }}"
      register: homebrew_cask_results
      ignore_errors: true

    - name: Report failed Homebrew cask packages
      debug:
        msg: "Failed to install Homebrew cask: {{ item.item }}"
      loop: "{{ homebrew_cask_results.results | selectattr('failed', 'defined') | selectattr('failed') | list }}"
      when:
        - os_type == 'Darwin'
        - homebrew_cask_results is defined

    - name: Set Arc as default browser
      shell: defaultbrowser browser
      when: os_type == 'Darwin'

    - name: Run nix
      shell: nix run nix-darwin -- switch --flake {{ ansible_env.HOME }}/.config/nix#default
      become: yes
      when: os_type == 'Darwin'

    - name: Set PDF Expert as default PDF app
      shell: nix run nixpkgs#duti -- -s com.readdle.PDFExpert-Mac pdf all
      when: os_type == 'Darwin'

    - name: Set IINA as default video app
      shell: |
        nix run nixpkgs#duti -- -s com.colliderli.iina mp4 all
        nix run nixpkgs#duti -- -s com.colliderli.iina webm all
        nix run nixpkgs#duti -- -s com.colliderli.iina mov all
        nix run nixpkgs#duti -- -s com.colliderli.iina avi all
        nix run nixpkgs#duti -- -s com.colliderli.iina mkv all
      when: os_type == 'Darwin'
